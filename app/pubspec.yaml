name: arogyasathi
description: Arogyasathi - Your Comprehensive Health Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lucide_icons: 0.257.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2

  # Date & Time
  intl: ^0.19.0

  # File Handling / Health Locker
  file_picker: ^8.0.7
  path_provider: ^2.1.2
  open_filex: ^4.5.0

  # Charts
  fl_chart: ^0.66.2

  # Animations
  animate_do: ^3.3.4
  lottie: ^3.0.0

  # Firebase (auth + storage + firestore)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Permissions
  permission_handler: ^11.3.0

  # Location (for SOS)
  geolocator: ^11.0.0

  # URL Launcher (for calling 108)
  url_launcher: ^6.3.2
  http: ^1.6.0
  firebase_app_check: ^0.2.2+7
  firebase_messaging: ^14.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  # ── ADD THIS NEW ADAPTIVE ICON SECTION ──
  adaptive_icon_background: "#0D1B2A" # Your clinical navy background
  adaptive_icon_foreground: "assets/logo_foreground.png" # The newly cropped, zoomed-in logo


flutter_native_splash:
  color: "#0D1B2A" # Your Clinical Navy background
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    color: "#0D1B2A"